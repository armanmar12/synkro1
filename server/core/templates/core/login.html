{% load static %}
<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Synkro - Вход</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'core/styles.css' %}" />
  </head>
  <body>
    <div class="auth-page">
      <div class="card login-wrap">
        <div class="section-title">
          <h3>Вход в Synkro</h3>
          <span class="pill">Secure Access</span>
        </div>
        <p class="muted">Доступ выдаётся администратором.</p>

        {% if error %}
          <p class="error-text">{{ error }}</p>
        {% endif %}

        <form method="post" class="form-grid">
          {% csrf_token %}
          <div>
            <label for="id_username">Логин</label>
            <input id="id_username" class="input" name="username" placeholder="Введите логин" required />
          </div>
          <div>
            <label for="id_password">Пароль</label>
            <input id="id_password" class="input" name="password" placeholder="Введите пароль" type="password" required />
          </div>
          <button class="btn" type="submit">Войти</button>
        </form>
      </div>
    </div>
  </body>
</html>
